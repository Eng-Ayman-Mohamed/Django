<!-- prettier-ignore -->
{% extends "layout.html" %}
{% block title %}
    Login
{%endblock%}

{% block content %}
<div class="form-container">
  <form class="form-card django-form" action="{% url 'login' %}" method="POST">
    {% csrf_token %}
    <h2 class="form-title">Login</h2>
    {{ form }}
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Login</button>
    </div>
  </form>
</div>
{% endblock %}
