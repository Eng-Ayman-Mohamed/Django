<!-- prettier-ignore -->
{%extends "layout.html"%}
{% block title %}
    Trainees list
{%endblock%} 
{%block content%}
    <h1>List of trainees</h1>
    <div class="courses">
    {% for trainee in trainees %}
        <div class="trainee">
            <h2>
                <a href={% url 'viewTrainee' id=trainee.id %}>
                    {{ trainee.firstName }}
                </a>
            <h2>
            <h3> {{ trainee.lastName }}<h3>
            <p> {{ trainee.numOfMonths }}<p>
            <p> {{ trainee.track }}<p>
            <p> {{ trainee.createdAt }}<p>
        </div>
    {% endfor %}
    </div> 
{%endblock%}
