<!-- prettier-ignore -->
{%extends "layout.html"%}
{% block title %}
    New trainee
{%endblock%} 
{%block content%}
<div class="form-container">
  <form
    class="form-card django-form"
    method="post"
    enctype="multipart/form-data"
  >
    {%csrf_token%}
    <h2 class="form-title">Add New Trainee</h2>
    {{form.as_p}}
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Add Trainee</button>
      <a class="btn btn-secondary" href="{% url 'trainees' %}">Cancel</a>
    </div>
  </form>
</div>
{%endblock%}
